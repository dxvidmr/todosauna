# Plantilla base de grilla home (desktop)
# Regla actual: grid de 12 columnas con auto-rows.
# Para mover/balancear:
# - order_desktop: prioridad de colocacion
# - desktop_col_span / desktop_row_span: tamano de cada tarjeta
#
# Campos opcionales que puedes completar luego:
# - type: color | media | interactive_eval | rotator | pill
# - color_var: variable CSS (ej: --color-secondary)
# - eyebrow, title, copy, link, image, image_alt, actions, etc.
# - pill: se comporta como color y muestra solo title centrado
# - rotator (home): toma imagenes desde site.data[site.metadata] con regla browse
#   (browse-child-objects), usa image_small -> image_thumb y enlaza cada slide
#   a su registro interno /items/... . "image" y "link" solo actuan como fallback.

- id: slot_01
  order_desktop: 1
  type: media
  color_var: ""
  eyebrow: "LECTURA"
  title: "Lee la obra"
  copy: "Una edición divulgativa de <i>Fuenteovejuna</i> con anotaciones y recursos para su lectura"
  link: /lectura
  image: /assets/img/explore/edicion2009.jpg
  image_alt: "Imagen de la edición de 2009 a cargo de PROLOPE"
  desktop_col_span: 6
  desktop_row_span: 7
  tablet_col_span: 6
  tablet_row_span: 5

