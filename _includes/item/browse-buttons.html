{% comment %}

  Adds previous and next button arrows to provide navigation between items.
  Requires cb_page_gen plugin.
  The item order follows the order in the metadata CSV, so pre-sort the CSV to the desired order.

{%- endcomment -%}
<div id="item-nav">
  <div class="d-none d-md-block">
    <a class="previous btn btn-lg btn-circular" href="{{ page.previous_item | relative_url }}"><i class="fa fa-chevron-left"></i></a>
    <a class="next btn btn-lg btn-circular" href="{{ page.next_item | relative_url }}"><i class="fa fa-chevron-right"></i></a>
  </div>
</div>
<script>
  function leftArrowPressed() {
    var el = document.querySelector("#item-nav .previous");
    if (el) location.href = el.href;
  };

  function rightArrowPressed() {
    var el = document.querySelector("#item-nav .next");
    if (el) location.href = el.href;
  };

  function leftModalArrowPressed() {
    // Get the modal element.
    var modalshow = document.querySelector(".ta-modal.show, .modal.show");
    // If the modal exists, get the prev button element.
    if (modalshow) {
      const prevButton = modalshow.querySelector(".prev-child-button");
      // If the prev button exists, click it.
      if (prevButton) {
        prevButton.click();
      }
    }
  };

  function rightModalArrowPressed() {
    // Get the modal element.
    var modalshow = document.querySelector(".ta-modal.show, .modal.show");
    // If the modal exists, get the prev button element.
    if (modalshow) {
      const nextButton = modalshow.querySelector(".next-child-button");
      // If the prev button exists, click it.
      if (nextButton) {
        nextButton.click();
      }
    }
  };

  function isModalShown() {
    // Get the modal element.
    const modal = document.querySelector(".ta-modal.show, .modal.show");

    // Check if the modal has the "show" class.
    return modal && modal.classList.contains("show");
  };

  function isSpotlightModalShown() {
    // Get the modal element.
    const spotlight = document.getElementById("spotlight");
    // Check if the modal has the "show" class.
    return spotlight && spotlight.classList.contains("show");
  };


  document.onkeydown = function (evt) {
    if (isSpotlightModalShown()) {


    } else if (isModalShown()) {
      // The modal is shown.
      evt = evt || window.event;
      switch (evt.keyCode) {
        case 37:
          leftModalArrowPressed();
            break;
        case 39:
          rightModalArrowPressed();
            break;
      }
    }
    else {
      // The modal is not shown.
      evt = evt || window.event;
      switch (evt.keyCode) {
        case 37:
          leftArrowPressed();
            break;
        case 39:
          rightArrowPressed();
            break;
      }
    }

  };
</script>
