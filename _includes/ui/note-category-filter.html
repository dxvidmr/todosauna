<section class="note-category-filter" id="note-category-filter" aria-labelledby="note-category-filter-title">
  <div class="note-category-filter-header">
    <button
      class="note-category-filter-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="note-category-filter-body"
      data-note-category-toggle>
      <span class="note-category-filter-heading">
        <span class="note-category-filter-title" id="note-category-filter-title">Tipologías de notas</span>
        <span class="note-category-filter-summary" data-note-category-summary aria-live="polite"></span>
      </span>
      <i class="fa-solid fa-chevron-down note-category-filter-chevron" aria-hidden="true"></i>
    </button>
    <button class="note-category-filter-reset" type="button" data-note-category-reset hidden>
      Restablecer
    </button>
  </div>

  <div class="note-category-filter-body" id="note-category-filter-body" data-note-category-body hidden>
    <p class="note-category-filter-help">Elige qué tipos de notas aparecen en la lectura.</p>
    <div class="note-category-filter-actions">
      <label class="note-category-filter-all">
        <input class="form-check-input" type="checkbox" data-note-category-all checked>
        <span>Todas</span>
      </label>
      <button class="note-category-filter-none" type="button" data-note-category-none>
        Ninguna
      </button>
    </div>

    <div class="note-category-filter-list" data-note-category-list></div>
  </div>
</section>
