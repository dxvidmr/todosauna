<script>

/* add items */
var items = [
    {% for item in items %}
    { {% for f in fields %}{% if item[f.field] %}{{ f.field | escape | jsonify }}:{{ item[f.field] | strip | jsonify }}, {%- endif -%}{%- endfor -%}
        {% if item.image_thumb %}"img": {{ item.image_thumb | relative_url | jsonify }}, {%- endif -%} 
        {% if item.display_template %}"display_template": {{ item.display_template | jsonify }}, {%- endif -%}
        {% if item.format %}"format": {{ item.format | jsonify }}, {%- endif -%}
        {% if item.type %}"type": {{ item.type | jsonify }}, {%- endif -%}
        {% if item.image_alt_text %}"alt": {{ item.image_alt_text | escape | jsonify }}, {%- endif -%}
        "title":{{ item.title | strip | escape | jsonify }},
        {% if item.parentid %}"parent": {{ item.parentid | jsonify }}, {%- endif -%}
        "id":{{ item.objectid | jsonify }} }{% unless forloop.last %},{% endunless %}{%- endfor -%}
];

{% include helpers/get-icon.js %}

var msnry = null;
var browseColumnsStorageKey = 'browseColumns';
var browseColumnsDefault = 5;
var browseColumnsMin = 3;
var browseColumnsMax = 6;

function normalizeBrowseColumns(value) {
    var parsed = parseInt(value, 10);
    if (isNaN(parsed)) return browseColumnsDefault;
    return Math.max(browseColumnsMin, Math.min(browseColumnsMax, parsed));
}

function parseCssSizeToPx(value) {
    var raw = (value || '').trim();
    if (!raw) return 0;
    var num = parseFloat(raw);
    if (isNaN(num)) return 0;
    if (raw.indexOf('rem') !== -1) {
        var rootSize = parseFloat(getComputedStyle(document.documentElement).fontSize);
        return num * (isNaN(rootSize) ? 16 : rootSize);
    }
    return num;
}

function getBrowseGutterPx() {
    if (!browseItemsDiv) return 0;
    var gutterValue = getComputedStyle(browseItemsDiv).getPropertyValue('--browse-gutter');
    return parseCssSizeToPx(gutterValue);
}

function createMasonrySizer() {
    var sizer = document.createElement('div');
    sizer.className = 'browse-sizer';
    return sizer;
}

function initMasonry() {
    if (!browseItemsDiv || typeof Masonry === 'undefined') return;
    if (msnry) {
        msnry.destroy();
        msnry = null;
    }
    msnry = new Masonry(browseItemsDiv, {
        itemSelector: '.browse-item',
        columnWidth: '.browse-sizer',
        gutter: getBrowseGutterPx(),
        percentPosition: true
    });
}

function applyBrowseColumns(value, persist) {
    if (persist === undefined) persist = true;
    var columns = normalizeBrowseColumns(value);
    var valueSpan = document.getElementById('browseColumnsValue');
    if (valueSpan) valueSpan.textContent = columns;
    if (browseItemsDiv) {
        browseItemsDiv.style.setProperty('--browse-columns-user', columns);
        browseItemsDiv.dataset.columns = columns;
    }
    var buttons = document.querySelectorAll('.browse-columns-item');
    buttons.forEach(function(button) {
        var buttonValue = parseInt(button.dataset.columns, 10);
        button.classList.toggle('active', buttonValue === columns);
    });
    if (persist) {
        try {
            localStorage.setItem(browseColumnsStorageKey, columns);
        } catch (e) {
            // ignore storage errors
        }
    }
    if (msnry) {
        msnry.reloadItems();
        msnry.layout();
    }
}

function initColumnsControl() {
    var buttons = document.querySelectorAll('.browse-columns-item');
    buttons.forEach(function(button) {
        button.addEventListener('click', function() {
            applyBrowseColumns(button.dataset.columns, true);
        });
    });

    var stored = null;
    try {
        stored = localStorage.getItem(browseColumnsStorageKey);
    } catch (e) {
        stored = null;
    }
    var initial = normalizeBrowseColumns(stored || browseColumnsDefault);
    applyBrowseColumns(initial, false);
}

function debounce(fn, wait) {
    var timeout;
    return function() {
        var args = arguments;
        clearTimeout(timeout);
        timeout = setTimeout(function() { fn.apply(null, args); }, wait);
    };
}

/* function to create cards for each item */ 
function firstMetaValue(value) {
    if (!value) return "";
    var values = value.toString().split(";").map(function(v) { return v.trim(); }).filter(Boolean);
    return values.length ? values[0] : "";
}

function compactTypeLabel(obj) {
    var typeValue = firstMetaValue(obj.type);
    if (typeValue) return typeValue;

    var templateValue = firstMetaValue(obj.display_template);
    if (templateValue) return templateValue.replace(/_/g, " ");

    var formatValue = firstMetaValue(obj.format);
    if (formatValue) {
        var pieces = formatValue.split("/");
        return pieces[pieces.length - 1];
    }

    return "";
}

function makeCard(obj) {
    var placeholder = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 2'%3E%3C/svg%3E";
    var itemHref = `{{ '/items/' | relative_url }}${ obj.parent ? obj.parent + ".html#" + obj.id : obj.id + ".html"}`; 
    var thumbIcon = !obj.img ? getIcon(obj.display_template, obj.format, "thumb") : "";
    var imgAlt = obj.alt ? obj.alt : obj.title;
    var creator = firstMetaValue(obj.creator);
    var location = firstMetaValue(obj.location);
    var dateLabel = firstMetaValue(obj.date);
    var typeLabel = compactTypeLabel(obj);

    var card = '<div class="browse-item"><a class="browse-card-link" href="' + itemHref + '">';
    card += '<div class="browse-media">';

    if (obj.img) {
        card += '<img class="browse-media-image lazyload" src="' + placeholder + '" data-src="' + obj.img + '" alt="' + imgAlt + '">';
    } else if (thumbIcon) {
        card += '<div class="browse-media-icon" aria-hidden="true">' + thumbIcon + '</div>';
    } else {
        card += '<div class="browse-media-icon" aria-hidden="true"></div>';
    }

    if (dateLabel || typeLabel) {
        card += '<div class="browse-badges">';
        if (dateLabel) card += '<span class="browse-badge">' + dateLabel + '</span>';
        if (typeLabel) card += '<span class="browse-badge browse-badge--type">' + typeLabel + '</span>';
        card += '</div>';
    }

    card += '<div class="browse-hover-overlay">';
    if (creator || location) {
        card += '<div class="browse-hover-meta">';
        if (creator) card += '<p class="browse-hover-row"><span class="browse-hover-label">Creador:</span> ' + creator + '</p>';
        if (location) card += '<p class="browse-hover-row"><span class="browse-hover-label">Lugar:</span> ' + location + '</p>';
        card += '</div>';
    }
    card += '</div>';
    card += '</div>';

    card += '<div class="browse-caption"><h3 class="browse-title">' + obj.title + '</h3></div>';
    card += '</a></div>';
    return card;
}

/* filter items function */
function filterItems(arr,q,field) {
    // show loading icon
    loadingIcon.classList.remove("d-none");
    // dont filter if no q 
    if (q=="") { 
        var filteredItems = arr; 
    } else {
        q = q.trim().toUpperCase(); 
        // js indexOf filter
        var filteredItems = [];
        for (var i = 0, len = arr.length; i < len; i++) {
            var val = "";
            // if field is specified, only search that field
            if (field && field !== "all" && arr[i][field]) {
                val = arr[i][field] + " ";
            } else {
                // search all fields
                for (var k in arr[i]) { 
                    if (k != "img") { val += arr[i][k] + " "; }
                }
            }
            if(val.toUpperCase().indexOf(q) != -1){
                filteredItems.push(arr[i]);
            }
        }
    }
    // add number 
    document.querySelector("#numberOf").innerHTML = filteredItems.length + " de {{ items | size }} elementos";
    
    // add stuff, make cards first in giant var, then add all at once to speed things up
    var cards = "";
    for (var i = 0, len = filteredItems.length; i < len; i++) {
        cards += makeCard(filteredItems[i]);
    }
    browseItemsDiv.innerHTML = '';
    browseItemsDiv.appendChild(createMasonrySizer());
    browseItemsDiv.insertAdjacentHTML('beforeend', cards);
    initMasonry();

    // finish
    if (q != "") {
        filterTextBox.focus();
    }
    loadingIcon.classList.add("d-none");
};

/* Fisher-Yates shuffle https://bost.ocks.org/mike/shuffle/ */
function shuffle(array) {
    var m = array.length, t, i;
    while (m) {
        i = Math.floor(Math.random() * m--);
        t = array[m];
        array[m] = array[i];
        array[i] = t;
    }
    return array;
}

/* init browse page */

/* set default sort or randomize items once at page load */
{% if site.data.theme.default-sort-field %}
var defaultSort = "{{ site.data.theme.default-sort-field }}".toLowerCase();
// Apply default sort
sorting(items, defaultSort);
// Update UI to show default sort is active
var defaultSortButton = document.querySelector('[data-filter="' + defaultSort + '"]');
if (defaultSortButton) {
    defaultSortButton.classList.add("active");
    var sortFilter = document.querySelector("#sortFilter");
    if (sortFilter) {
        sortFilter.innerHTML = defaultSortButton.textContent;
    }
}
{% else %}
/* randomize items once at page load */
shuffle(items);
{% endif %}

/* set some elements */ 
var loadingIcon = document.querySelector("#loadingIcon");
var filterTextBox = document.querySelector('#filterTextBox');
var filterButton = document.querySelector("#filterButton");
var browseItemsDiv = document.querySelector("#browseItems");
initColumnsControl();

/* filter if hash in initial URL */
var query = "";
var searchField = "all";
if(window.location.hash) {
    var hashValue = decodeURIComponent(location.hash.substr(1));
    if (hashValue != 'maincontent') { 
        // check if hash contains field:query format
        if (hashValue.includes(":")) {
            var parts = hashValue.split(":");
            searchField = parts[0];
            query = parts.slice(1).join(":"); // rejoin in case value contains colons
        } else {
            query = hashValue;
        }
    } else {
        query = "";
    }
    filterTextBox.value = query;
    filterItems(items,query,searchField);
} else {
    query = "";
    filterItems(items,query,searchField);
}

/* filter form */
function submitFilter() {
    query = filterTextBox.value;
    window.location.hash = encodeURIComponent(query);
}
/* reset filters */ 
function resetFilter() {
    query = "";
    filterTextBox.value = query;
    window.location.hash = encodeURIComponent(query);
}

/* filter if hash changes */ 
window.addEventListener("hashchange", function() {
    // read hash
    var hashValue = decodeURIComponent(location.hash.substr(1));
    if (hashValue != 'maincontent') { 
        // check if hash contains field:query format
        if (hashValue.includes(":")) {
            var parts = hashValue.split(":");
            searchField = parts[0];
            query = parts.slice(1).join(":"); // rejoin in case value contains colons
        } else {
            searchField = "all";
            query = hashValue;
        }
        filterTextBox.value = query;
        // filter
        filterItems(items,query,searchField);
    }
});

/* item array sorting function */
function sorting(json_object, key_to_sort_by) {
    function sortByKey(a, b) {
        var x = a[key_to_sort_by];
        var y = b[key_to_sort_by];
        if (typeof x === 'string' ) { x = x.toUpperCase(); }
        if (typeof y === 'string' ) { y = y.toUpperCase(); }
        return ((x==null) ? 1: (y==null) ? -1: (x < y) ? -1 : ((x > y) ? 1 : 0));
    }
    json_object.sort(sortByKey);
};

/* add sort function on click of sort options */
var sortFilter = document.querySelector("#sortFilter");
var sortOptions = document.querySelectorAll(".browse-sort-item");
sortOptions.forEach((button) => {
  button.addEventListener("click", (event) => {
    // get the sort field
    var field = button.dataset.filter;
    var display_name = button.textContent;
    // get current filter
    var query = filterTextBox.value;
    // switch active sort option
    sortOptions.forEach((option) => { option.classList.remove("active"); } );
    button.classList.add("active");
    sortFilter.innerHTML = display_name;
    // send to sort and filter
    if (field != 'random') {
        sorting(items, field);
        filterItems(items, query);
    }
    else {
        shuffle(items);
        filterItems(items, query);
    }
  });
}); 

/* Masonry relayout on lazyloaded images and resize */
document.addEventListener('lazyloaded', function() {
    if (msnry) msnry.layout();
});
window.addEventListener('resize', debounce(function() {
    if (msnry) msnry.layout();
}, 150));

</script>
